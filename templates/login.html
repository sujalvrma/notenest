{% extends "base.html" %}
{% block title %}Sign In — NoteNest{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon lg">N</div>
      <span>NoteNest</span>
    </div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to your NoteNest account</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="you@example.com" autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Sign in</button>
    </form>

    <p class="auth-switch">No account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}

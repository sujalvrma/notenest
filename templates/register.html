{% extends "base.html" %}
{% block title %}Register — NoteNest{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon lg">N</div>
      <span>NoteNest</span>
    </div>
    <h2>Join NoteNest</h2>
    <p class="auth-sub">Create your contributor account — free forever</p>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" name="first_name" required placeholder="Priya"/>
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" name="last_name" required placeholder="Sharma"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="@priya_notes"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Min. 8 characters" minlength="8"/>
      </div>
      <div class="form-group">
        <label>Primary subject you'll contribute</label>
        <select name="subject">
          <option value="">Select subject...</option>
          {% for s in ['Mathematics','Physics','Chemistry','Biology','History','Computer Science','Economics','Multiple subjects'] %}
            <option>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Create account &amp; start uploading</button>
    </form>

    <p class="auth-switch">Already registered? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
